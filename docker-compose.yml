services:
  xianyu-app:
    build:
      context: .
      dockerfile: Dockerfile-cn
    image: xianyu-auto-reply:latest
    container_name: xianyu-auto-reply
    restart: unless-stopped
    init: true
    # 使用root用户避免权限问题
    user: "0:0"
    ports:
      - "${WEB_PORT:-10005}:8080"
    shm_size: "${SHM_SIZE:-256m}"
    volumes:
      # 开发模式：仅挂载源码与配置，避免覆盖镜像内/app导致启动脚本和权限异常
      - ./entrypoint.sh:/app/entrypoint.sh:rw
      - ./XianyuAutoAsync.py:/app/XianyuAutoAsync.py:rw
      - ./static/xianyu_js_version_2.js:/app/static/xianyu_js_version_2.js:ro
      - ./Start.py:/app/Start.py:rw
      - ./reply_server.py:/app/reply_server.py:rw
      - ./cookie_manager.py:/app/cookie_manager.py:rw
      - ./db_manager.py:/app/db_manager.py:rw
      - ./config.py:/app/config.py:rw
      - ./order_status_handler.py:/app/order_status_handler.py:rw
      - ./file_log_collector.py:/app/file_log_collector.py:rw
      - ./ai_reply_engine.py:/app/ai_reply_engine.py:rw
      - ./api_captcha_remote.py:/app/api_captcha_remote.py:rw
      - ./simple_stats_server.py:/app/simple_stats_server.py:rw
      - ./utils:/app/utils:rw
      # 数据持久化
      - ${DATA_DIR:-/opt/dockerdata/xianyu-auto-reply}:/app/data:rw
      - ${LOGS_DIR:-./logs}:/app/logs:rw
      - ./global_config.yml:/app/global_config.yml:ro
      # 可选：如果需要自定义配置
      # - ./custom_config.yml:/app/global_config.yml:ro
      # 可选：备份目录
      - ${BACKUPS_DIR:-./backups}:/app/backups:rw
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - PYTHONDONTWRITEBYTECODE=${PYTHONDONTWRITEBYTECODE:-1}
      - TZ=${TZ:-Asia/Shanghai}
      - DISPLAY=${DISPLAY:-:99}
      - SLIDER_HEADLESS=${SLIDER_HEADLESS:-false}
      - DB_PATH=${DB_PATH:-/app/data/xianyu_data.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
      - RELOAD=${RELOAD:-false}
      # SQL日志配置（默认启用，可通过环境变量覆盖）
      - SQL_LOG_ENABLED=${SQL_LOG_ENABLED:-false}
      - SQL_LOG_LEVEL=${SQL_LOG_LEVEL:-WARNING}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default-secret-key}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-3600}
      # 多用户系统配置
      - MULTIUSER_ENABLED=${MULTIUSER_ENABLED:-true}
      - USER_REGISTRATION_ENABLED=${USER_REGISTRATION_ENABLED:-true}
      - EMAIL_VERIFICATION_ENABLED=${EMAIL_VERIFICATION_ENABLED:-true}
      - CAPTCHA_ENABLED=${CAPTCHA_ENABLED:-true}
      - TOKEN_EXPIRE_TIME=${TOKEN_EXPIRE_TIME:-86400}
      - AUTO_REPLY_ENABLED=${AUTO_REPLY_ENABLED:-true}
      - AUTO_DELIVERY_ENABLED=${AUTO_DELIVERY_ENABLED:-true}
      - AUTO_DELIVERY_TIMEOUT=${AUTO_DELIVERY_TIMEOUT:-30}
      - API_CARD_TIMEOUT=${API_CARD_TIMEOUT:-10}
      - BATCH_DATA_LOCK_TIMEOUT=${BATCH_DATA_LOCK_TIMEOUT:-5}
      # AI回复相关配置
      - AI_REPLY_ENABLED=${AI_REPLY_ENABLED:-false}
      - DEFAULT_AI_MODEL=${DEFAULT_AI_MODEL:-qwen-plus}
      - DEFAULT_AI_BASE_URL=${DEFAULT_AI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - AI_REQUEST_TIMEOUT=${AI_REQUEST_TIMEOUT:-30}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-100}
      - WEBSOCKET_URL=${WEBSOCKET_URL:-wss://wss-goofish.dingtalk.com/}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-15}
      - HEARTBEAT_TIMEOUT=${HEARTBEAT_TIMEOUT:-30}
      - TOKEN_REFRESH_INTERVAL=${TOKEN_REFRESH_INTERVAL:-72000}
      - TOKEN_RETRY_INTERVAL=${TOKEN_RETRY_INTERVAL:-600}
      - MESSAGE_EXPIRE_TIME=${MESSAGE_EXPIRE_TIME:-300000}
      - COOKIE_REFRESH_ENABLED=${COOKIE_REFRESH_ENABLED:-true}
      - COOKIE_REFRESH_INTERVAL=${COOKIE_REFRESH_INTERVAL:-21600}
      - COOKIE_VERIFY_AFTER_REFRESH=${COOKIE_VERIFY_AFTER_REFRESH:-false}

    networks:
      - xianyu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: "${MEMORY_LIMIT:-600m}"
    mem_reservation: "${MEMORY_RESERVATION:-300m}"
    cpus: "${CPU_LIMIT:-1.5}"
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
    # 资源限制
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-600m}
          cpus: '${CPU_LIMIT:-2.0}'
        reservations:
          memory: ${MEMORY_RESERVATION:-300m}
          cpus: '${CPU_RESERVATION:-0.5}'

  # 可选：添加Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: xianyu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - xianyu-app
    networks:
      - xianyu-network
    profiles:
      - with-nginx

networks:
  xianyu-network:
    driver: bridge

volumes:
  xianyu-data:
    driver: local
  xianyu-logs:
    driver: local
